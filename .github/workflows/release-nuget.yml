name: Release NuGet

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version, for example 2.0.0 or 2.0.1-preview.1
        required: true
        type: string
      publish:
        description: Publish packages to NuGet.org
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  NUGET_USER: ${{ vars.NUGET_USER || github.repository_owner }}

jobs:
  pack-and-publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', 'NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Resolve package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            if [[ "$GITHUB_REF_NAME" == v* ]]; then
              echo "Release tags must use plain SemVer without a leading 'v': $GITHUB_REF_NAME"
              exit 1
            fi
            version="$GITHUB_REF_NAME"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $version"
            exit 1
          fi

          assembly_version="${version%%[-+]*}.0"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "ASSEMBLY_FILE_VERSION=$assembly_version" >> "$GITHUB_ENV"

      - name: Validate release tag is on master
        if: github.event_name == 'push'
        shell: bash
        run: |
          git fetch --no-tags origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Restore
        run: dotnet restore ComposeSharp.sln

      - name: Build
        run: dotnet build ComposeSharp.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test ComposeSharp.sln --configuration ${{ env.CONFIGURATION }} --no-build --no-restore

      - name: Pack
        run: >
          dotnet pack ComposeSharp.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --no-restore
          --output artifacts/packages
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}
          -p:AssemblyVersion=${{ env.ASSEMBLY_FILE_VERSION }}
          -p:FileVersion=${{ env.ASSEMBLY_FILE_VERSION }}
          -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }}
          -p:RepositoryBranch=${{ github.ref_name }}
          -p:RepositoryCommit=${{ github.sha }}

      - name: Validate packaged README
        shell: pwsh
        run: ./scripts/VerifyPackageReadme.ps1

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: NuGet login
        if: github.event_name == 'push' || inputs.publish == true
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_USER }}

      - name: Publish packages to NuGet.org
        if: github.event_name == 'push' || inputs.publish == true
        shell: bash
        run: |
          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push artifacts/packages/*.snupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
