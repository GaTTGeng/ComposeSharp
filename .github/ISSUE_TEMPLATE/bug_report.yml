name: Bug Report
description: Report a bug in ComposeSharp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal Compose file when relevant.

  - type: input
    id: version
    attributes:
      label: ComposeSharp Version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Version
      placeholder: "net8.0"
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker Engine Version
      placeholder: "26.1.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include code and a minimal Compose file when applicable.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
